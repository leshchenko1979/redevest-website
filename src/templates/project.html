<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | Редевест</title>
    <meta name="description" content="Инвестиционный проект «{{title}}» от Редевест">
    <meta name="author" content="Алексей Лещенко, Редевест">
    <link rel="canonical" href="https://rede-vest.ru/projects/{{slug}}.html">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">
    <link href="../input.css" rel="stylesheet">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://rede-vest.ru/projects/{{slug}}.html">
    <meta property="og:title" content="{{title}} | Редевест">
    <meta property="og:description" content="Инвестиционный проект «{{title}}» от Редевест">
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://rede-vest.ru/projects/{{slug}}.html">
    <meta property="twitter:title" content="{{title}} | Редевест">
    <meta property="twitter:description" content="Инвестиционный проект «{{title}}» от Редевест">

    <!-- @include head-analytics.html -->
</head>

<body>
    <!-- Skip to main content -->
    <a href="#main-content"
        class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-primary text-white px-4 py-2 rounded-sm z-50">Перейти
        к основному содержимому</a>

    <!-- @include header -->

    <!-- Hero Section -->
    <main id="main-content">
        <section class="relative bg-surface hero-pattern section-main overflow-hidden">
            <!-- Abstract Decoration -->
            <div
                class="absolute top-0 right-0 w-1/3 h-full bg-gradient-to-l from-gray-100/50 to-transparent pointer-events-none">
            </div>

            <div class="container mx-auto px-6 relative z-10">
                <div class="max-w-4xl mx-auto text-center">
                    <div
                        class="inline-flex items-center px-3 py-1 mb-8 rounded-full bg-accent/10 text-accent text-sm font-medium uppercase tracking-wider shadow-ambient-sm">
                        {{hero_badge}}
                    </div>
                    <h1 class="text-4xl md:text-6xl font-serif font-medium text-primary mb-8 leading-tight">
                        {{title}}
                    </h1>
                    <p class="text-gray-600 mb-4 max-w-2xl mx-auto">{{cta_choice_text}}</p>
                    <div class="grid w-full max-w-2xl mx-auto grid-cols-1 sm:grid-cols-2 gap-3">
                        <a href="{{bot_link}}" target="_blank" rel="noopener noreferrer"
                            class="btn btn-lg btn-primary w-full inline-flex items-center justify-center gap-2">
                            <img src="../assets/telegram-logo-mono.svg" alt="" class="h-7 w-7 shrink-0 object-contain"
                                aria-hidden="true">
                            <span>{{telegram_cta_label}}</span>
                        </a>
                        <a href="{{max_bot_link}}" target="_blank" rel="noopener noreferrer"
                            class="btn btn-lg btn-primary w-full inline-flex items-center justify-center gap-2">
                            <img src="../assets/max-logo-mono.svg" alt="" class="h-6 w-6 shrink-0 object-contain"
                                aria-hidden="true">
                            <span>{{max_cta_button}}</span>
                        </a>
                    </div>
                    <p class="mt-2 text-sm text-gray-500">{{telegram_vpn_note}}</p>
                </div>
            </div>
        </section>

        <!-- Project Content Section -->
        <section id="project-details" class="py-20 bg-white">
            <div class="container mx-auto px-6">
                <div class="max-w-4xl mx-auto">
                    <article class="content-typography max-w-none">
                        {{content}}
                    </article>

                    <div class="mt-16 text-center">
                        <div class="project-cta-glass">
                            <h3 class="text-2xl font-serif font-bold text-primary mb-4">{{cta_heading}}</h3>
                            <p class="text-gray-600 mb-8 max-w-2xl mx-auto">{{cta_text}}</p>
                            <div class="grid w-full max-w-2xl mx-auto grid-cols-1 sm:grid-cols-2 gap-3">
                                <a href="{{bot_link}}" target="_blank" rel="noopener noreferrer"
                                    class="btn btn-lg btn-primary w-full inline-flex items-center justify-center gap-2">
                                    <img src="../assets/telegram-logo-mono.svg" alt=""
                                        class="h-7 w-7 shrink-0 object-contain" aria-hidden="true">
                                    <span>{{telegram_cta_label}}</span>
                                </a>
                                <a href="{{max_bot_link}}" target="_blank" rel="noopener noreferrer"
                                    class="btn btn-lg btn-primary w-full inline-flex items-center justify-center gap-2">
                                    <img src="../assets/max-logo-mono.svg" alt=""
                                        class="h-6 w-6 shrink-0 object-contain" aria-hidden="true">
                                    <span>{{max_cta_button}}</span>
                                </a>
                            </div>
                            <p class="mt-2 text-sm text-gray-500">{{telegram_vpn_note}}</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- @include footer -->
</body>

</html>
